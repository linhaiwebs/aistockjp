version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: stock-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
      - nginx_logs:/var/log/nginx
    depends_on:
      php:
        condition: service_healthy
      nodejs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stock-ai-network

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: stock-ai-php
    volumes:
      - ./:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - stock-ai-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nodejs:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: stock-ai-nodejs
    environment:
      - NODE_ENV=production
      - API_PORT=3001
    restart: unless-stopped
    networks:
      - stock-ai-network
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/index/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  stock-ai-network:
    driver: bridge

volumes:
  nginx_logs:
