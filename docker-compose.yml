version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: stock-ai-nginx
    ports:
      - "8000:80"
      - "8001:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
      - nginx_logs:/var/log/nginx
    depends_on:
      - php
      - nodejs
    restart: unless-stopped
    networks:
      - stock-ai-network

  php:
    image: php:8.2-fpm
    container_name: stock-ai-php
    volumes:
      - ./:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - stock-ai-network
    command: >
      sh -c "
        apt-get update &&
        apt-get install -y libcurl4-openssl-dev pkg-config libssl-dev libonig-dev &&
        docker-php-ext-install curl mbstring &&
        echo '[www]' > /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'listen = 0.0.0.0:9000' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'pm = dynamic' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'pm.max_children = 5' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'pm.start_servers = 2' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'pm.min_spare_servers = 1' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        echo 'pm.max_spare_servers = 3' >> /usr/local/etc/php-fpm.d/zz-docker.conf &&
        php-fpm
      "
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nodejs:
    image: node:20-alpine
    container_name: stock-ai-nodejs
    working_dir: /app
    volumes:
      - ./index:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - API_PORT=3001
    command: sh -c "apk add --no-cache wget && npm install --include=dev && npm run build && npm run start:prod"
    restart: unless-stopped
    networks:
      - stock-ai-network
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/index/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  stock-ai-network:
    driver: bridge

volumes:
  nginx_logs:
  node_modules:
