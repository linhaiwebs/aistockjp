version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: stock-ai-nginx
    ports:
      - "8000:80"
      - "8001:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
      - nginx_logs:/var/log/nginx
    depends_on:
      - php
      - nodejs
    restart: unless-stopped
    networks:
      - stock-ai-network

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: stock-ai-php
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - stock-ai-network

  nodejs:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: stock-ai-nodejs
    environment:
      - NODE_ENV=production
      - API_PORT=3001
    restart: unless-stopped
    networks:
      - stock-ai-network
    depends_on:
      - php

networks:
  stock-ai-network:
    driver: bridge

volumes:
  nginx_logs:
