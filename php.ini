; PHP Configuration for Stock AI Service
; Required for Cloaking.House integration

; File uploads
upload_max_filesize = 10M
post_max_size = 10M

; Memory
memory_limit = 256M

; Timeouts
max_execution_time = 300
max_input_time = 300

; Error reporting (disable in production)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log

; Required settings for index.php
allow_url_fopen = On
allow_url_include = Off

; Security
expose_php = Off
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

; Extensions (ensure these are loaded)
extension=curl
extension=mbstring
extension=openssl
extension=json

; Timezone
date.timezone = Asia/Tokyo

; Output buffering
output_buffering = 4096

; Character encoding
default_charset = "UTF-8"
